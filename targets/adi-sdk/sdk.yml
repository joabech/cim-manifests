mirror: $HOME/tmp/mirror

os_dependencies: !include os-dependencies.yml

# Extra makefile(s) to be included to the generated Makefile. This can be used
# to add custom targets or override existing ones. The will be included as
# "safe inclusion", meaning that if the generated Makefile doens't find the
# files here, then it will just skip them without error.
makefile_include:
  - include tbd.mk

# Toolchain configurations with OS and architecture filtering
toolchains:
  - name: arm-gnu-toolchain-14.3.rel1-darwin-arm64-arm-none-eabi.tar.xz
    url: https://developer.arm.com/-/media/Files/downloads/gnu/14.3.rel1/binrel/
    destination: toolchains/aarch32
    strip_components: 1
    os: darwin
    arch: arm64

  - name: arm-gnu-toolchain-13.3.rel1-x86_64-arm-none-eabi.tar.xz  
    url: https://armkeil.blob.core.windows.net/developer/Files/downloads/gnu/13.3.rel1/binrel
    destination: toolchains/aarch32
    strip_components: 1
    os: linux
    arch: x86_64

envsetup: |
  @echo "Setting up ADI build environment"
  @echo "In a shell session, run:"
  @echo "  source .venv/bin/activate"
  @echo ""
  @echo "Then, the development environment is ready to be used, try:"
  @echo "  # Default hello-world example"
  @echo "  make sdk-test"
  @echo ""
  @echo "  # Or the I2C demo using the core-sw-sdk-bm-drivers"
  @echo "  make -C dsdk-builder-bm max32657 CONFIG=max32657_i2c_demo_defconfig"

# For now, let's test just "hello-world" build for the host architecture.
test: |
  @echo "Running tests"
  $(MAKE) -C dsdk-builder-bm clean
  $(MAKE) -C dsdk-builder-bm test DARCH=host

# Git repositories with build commands
gits:
  - name: "drivers"
    url: "https://github.com/adi-innersource/core-sw-sdk-bm-drivers.git"
    commit: "main"
    build: |
      @echo "Building ADI drivers"
      @echo "✓ Drivers built as part of SOC projects - no standalone build"
    
  - name: "CMSIS_6"
    url: "https://github.com/ARM-software/CMSIS_6.git" 
    commit: "main"
    build: |
      @echo "Building CMSIS_6"
      @echo "✓ CMSIS_6 is a header-only library - no build required"
    
  - name: "sdp-examples-bm"
    url: "https://github.com/adi-innersource/sdp-examples-bm.git"
    commit: "main"
    build: |
      @echo "Building examples"
      @echo "✓ Examples built via SOC projects"
    
  - name: "dsdk-builder-bm"
    url: "https://github.com/adi-innersource/dsdk-builder-bm.git"
    commit: "main"
    build: |
      @echo "Building adi-build"
      $(MAKE) -C dsdk-builder-bm DARCH=$(or $(DARCH),arm) PROJECT=$(or $(PROJECT),hello-world) CONFIG=$(or $(CONFIG),max32657_defconfig) SOC=$(or $(SOC),max32657) $(MAKEFLAGS)
