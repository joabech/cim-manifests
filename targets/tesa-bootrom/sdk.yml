mirror: $HOME/tmp/mirror

# Toolchain configurations with OS and architecture filtering
toolchains:
  - name: arm-gnu-toolchain-13.3.rel1-darwin-arm64-arm-none-eabi.tar.xz
    url: https://developer.arm.com/-/media/Files/downloads/gnu/13.3.rel1/binrel/
    destination: toolchains/aarch32
    strip_components: 1
    os: darwin
    arch: arm64

  - name: arm-gnu-toolchain-13.3.rel1-x86_64-arm-none-eabi.tar.xz
    url: https://armkeil.blob.core.windows.net/developer/Files/downloads/gnu/13.3.rel1/binrel
    destination: toolchains/aarch32
    strip_components: 1
    os: linux
    arch: x86_64

envsetup: |
  @echo "Setting up tesa-bootrom build environment.."
  @echo "Cloning adi-sdk submodules.."
  git -C adi-sdk submodule update --init --recursive --depth=1
  @echo "Applying patches.."
  cd tesa-bootrom && git am ../patches/tesa-bootrom/000*.patch || true
  cd adi-sdk && git am ../patches/adi-sdk/000*.patch || true
  @echo "Environment setup completed"
  @echo "In a shell session, run:"
  @echo "  source .venv/bin/activate"

clean: |
  @echo "Cleaning build environment.."
  rm -r build/${TARGET}

build: |
  @mkdir -p build/${TARGET}/bl1/bl1_2
  @echo "Building bl1_2 for target ${TARGET}.."
  cmake -S tesa-bootrom/bl1/bl1_2 -B build/${TARGET}/bl1/bl1_2 -DTARGET=${TARGET} -DENABLE_HASH_CHECK=${ENABLE_HASH_CHECK} -DENABLE_SIGNATURE_ENCRYPTION=${ENABLE_SIGNATURE_ENCRYPTION} && cmake --build build/${TARGET}/bl1/bl1_2 -j${JOBS}

  @mkdir -p build/${TARGET}/bl1/bl1_1
  @echo "Building bl1_1 for target ${TARGET}.."
  cmake -S tesa-bootrom/bl1/bl1_1 -B build/${TARGET}/bl1/bl1_1 -DTARGET=${TARGET} -DENABLE_HASH_CHECK=${ENABLE_HASH_CHECK} -DENABLE_SIGNATURE_ENCRYPTION=${ENABLE_SIGNATURE_ENCRYPTION} && cmake --build build/${TARGET}/bl1/bl1_1 -j${JOBS}

test:
  - "@echo test command not yet implemented - this is a placeholder"

flash:
  - "@echo flash command not yet implemented - this is a placeholder"

makefile_include:
  - include env.mk

copy_files:
  - source: env.mk
    dest: env.mk

  - source: patches/
    dest: patches/

gits:
  # application development kit repo
  - name: tesa-bootrom
    url: https://github.com/adi-innersource/secswgensecbl.git
    commit: main

  - name: mcuboot
    url: https://github.com/adi-innersource/mcuboot.git
    commit: adi-main

  - name: adi-sdk
    url: https://github.com/adi-innersource/adi-sdk.git
    commit: main

  - name: adi-zephyr-sdk
    url: https://github.com/adi-innersource/adi-zephyr-sdk.git
    commit: ec8923a5

  - name: msdk
    url: https://github.com/adi-innersource/secsw-msdk-mirror.git
    commit: dev/gensecbl
