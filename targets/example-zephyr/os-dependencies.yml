# YAML anchors for reusable package lists
ubuntu_packages: &ubuntu_packages
      - ccache
      - cmake
      - device-tree-compiler
      - dfu-util
      - file
      - g++-multilib
      - gcc
      - gcc-multilib
      - git
      - gperf
      - libmagic1
      - libsdl2-dev
      - make
      - ninja-build
      - python3-dev
      - python3-tk
      - python3-venv
      - wget
      - xz-utils

# Linux x86_64 (Intel/AMD) dependencies
linux-x86_64:
  ubuntu:
    version: "22.04"
    command: "apt-get install"
    packages: *ubuntu_packages
  
# Fedora build for Zephyr isn't defined yet:
# https://docs.zephyrproject.org/latest/develop/getting_started/index.html
# fedora:
#   version: "42"
#   command: "dnf install"
#   packages:

# Linux ARM64 (Apple Silicon, ARM servers) dependencies  
linux-aarch64:
  ubuntu:
    version: "22.04"
    command: "apt-get install"
    packages: *ubuntu_packages
  
# Linux legacy
linux:
  ubuntu:
    version: "22.04"
    command: "apt-get install"
    packages: *ubuntu_packages
  
# MacOS dependencies
macos:
  macos:
    version: "any"
    command: "brew install"
    packages:
      - ccache
      - cmake
      - dtc
      - gperf
      - libmagic
      - ninja
      - openocd
      - python-tk
      - python3
      - qemu
      - wget
