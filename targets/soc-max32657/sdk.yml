mirror: $HOME/tmp/mirror

os_dependencies: !include os-dependencies.yml

# Extra makefile to be included to the generated Makefile. This can be used to
# add custom targets or override existing ones. The will be included as "safe
# inclusion", meaning that if the generated Makefile doens't find the files
# here, then it will just skip them without error.
makefile_include:
  - include tbd.mk

# Shall support both yaml list and block styles
envsetup: |
  @echo "Setting up ADI SDK environment"
  @echo "Downloading ARM toolchain..."
  mkdir -p $$HOME/tmp/mirror $(CURDIR)/toolchains
  @wget -nc -P "$$HOME/tmp/mirror" https://armkeil.blob.core.windows.net/developer/Files/downloads/gnu/13.3.rel1/binrel/arm-gnu-toolchain-13.3.rel1-x86_64-arm-none-eabi.tar.xz
  tar -xf $$HOME/tmp/mirror/arm-gnu-toolchain-13.3.rel1-x86_64-arm-none-eabi.tar.xz -C $(CURDIR)/toolchains
  mv $(CURDIR)/toolchains/arm-gnu-toolchain-13.3.rel1-x86_64-arm-none-eabi $(CURDIR)/toolchains/aarch32 2>/dev/null || echo 'Toolchain already in place'
  @echo "✓ Toolchains have been installed"

# Shall support both yaml list and block styles
test: |
  @echo "Running ADI SDK tests"
  make clean
  make test

# Git repositories with build commands
gits:
  - name: "adi-sdk-common"
    url: "https://github.com/Joakim-Bech_adi/adi-sdk-common.git"
    commit: "main" 
    # Shall support both yaml list and block styles
    build: |
      @echo "Building ADI SDK core"
      @echo "✓ SDK is a configuration and build system - no compilation needed"
    
  - name: "drivers"
    url: "https://github.com/adi-innersource/core-sw-sdk-bm-drivers.git"
    commit: "main"
    # Shall support both yaml list and block styles
    build: |
      @echo "Building ADI drivers"
      @echo "✓ Drivers built as part of SOC projects - no standalone build"
    
  - name: "CMSIS_6"
    url: "https://github.com/ARM-software/CMSIS_6.git" 
    commit: "main"
    # Shall support both yaml list and block styles
    build: |
      @echo "Building CMSIS_6"
      @echo "✓ CMSIS_6 is a header-only library - no build required"
    
  - name: "adi-examples"
    url: "https://github.com/Joakim-Bech_adi/adi-examples.git"
    commit: "main"
    # Shall support both yaml list and block styles
    build: |
      @echo "Building examples"
      @echo "✓ Examples built via SOC projects"
    
  - name: "soc-max32657"
    url: "https://github.com/Joakim-Bech_adi/soc-max32657.git"
    commit: "main"
    # Shall support both yaml list and block styles
    build: |
      @echo "Building soc-max32657"
      $(MAKE) -C soc-max32657 DARCH=$${DARCH:-arm} PROJECT=$${PROJECT:-hello-world} CONFIG=$${CONFIG:-max32657_defconfig} $(MAKEFLAGS)
