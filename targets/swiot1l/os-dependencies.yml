# Common package lists using YAML anchors for DRY
ubuntu_packages: &ubuntu_pkgs
  - build-essential
  - cmake
  - curl
  - git
  - libaio-dev
  - libattr1-dev
  - libboost-all-dev
  - libcap-ng-dev
  - libglib2.0-dev
  - libhidapi-hidraw0
  - libhidapi-libusb0
  - libncurses-dev
  - libpixman-1-dev
  - libseccomp-dev
  - libssl-dev
  - libusb-0.1-4
  - libusb-1.0-0-dev
  - libxcb-glx0
  - libxcb-icccm4
  - libxcb-image0
  - libxcb-keysyms1
  - libxcb-randr0
  - libxcb-render-util0
  - libxcb-render0
  - libxcb-shape0
  - libxcb-shm0
  - libxcb-sync1
  - libxcb-util1
  - libxcb-xfixes0
  - libxcb-xinerama0
  - libxcb-xkb1
  - libxcb1
  - libxkbcommon-x11-0
  - libxkbcommon0
  - libzstd-dev
  - ninja-build
  - openocd
  - pkg-config
  - python-is-python3
  - python3
  - python3-pip
  - python3-venv
  - libgl1
  - vim

fedora_packages: &fedora_pkgs
  - cmake
  - curl
  - gcc
  - gcc-c++
  - git
  - boost-devel
  - openssl-devel
  - pkgconfig
  - python3
  - python3-pip
  - vim

# Linux x86_64 (Intel/AMD) dependencies
linux-x86_64:
  ubuntu:
    version: "22.04"
    command: "apt-get install"
    packages: *ubuntu_pkgs

  fedora:
    version: "42"
    command: "dnf install"
    packages: *fedora_pkgs

# Linux ARM64 (Apple Silicon, ARM servers) dependencies
linux-aarch64:
  ubuntu:
    version: "22.04"
    command: "apt-get install"
    packages: *ubuntu_pkgs

  fedora:
    version: "42"
    command: "dnf install"
    packages: *fedora_pkgs

# Backward compatibility - generic linux (defaults to x86_64 behavior)
linux:
  ubuntu:
    version: "22.04"
    command: "apt-get install"
    packages: *ubuntu_pkgs

  fedora:
    version: "42"
    command: "dnf install"
    packages: *fedora_pkgs

macos:
  macos:
    version: "any"
    command: "brew install"
    # See: https://www.qemu.org/docs/master/devel/build-environment.html#id2
    packages:
      - autoconf
      - automake
      - bison
      - ca-certificates
      - capstone
      - cmake
      - cmake
      - dtc
      - gettext
      - git
      - glib
      - gmp
      - gnutls
      - jpeg-turbo
      - libevent
      - libidn2
      - libnghttp2
      - libpng
      - libslirp
      - libssh
      - libtasn1
      - libtool
      - libunistring
      - libusb
      - lz4
      - lzo
      - m4
      - meson
      - mpdecimal
      - ncurses
      - nettle
      - ninja
      - openssl@3
      - p11-kit
      - pcre2
      - pixman
      - pkgconf
      - python-setuptools
      - python@3.14
      - python3
      - readline
      - snappy
      - spice-protocol
      - sqlite
      - unbound
      - vde
      - vim
      - xz
      - zstd
