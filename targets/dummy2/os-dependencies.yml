# Linux x86_64 (Intel/AMD) dependencies
linux-x86_64:
  ubuntu:
    version: "22.04"
    command: "apt-get install"
    packages:
      - build-essential
      - cmake
      - curl
      - git
      - libboost-all-dev
      - libssl-dev
      - pkg-config
      - python3
      - python3-pip
      - vim
  
  fedora:
    version: "42"
    command: "dnf install"
    packages:
      - cmake
      - curl
      - gcc
      - gcc-c++
      - git
      - boost-devel
      - openssl-devel
      - pkgconfig
      - python3
      - python3-pip
      - vim

