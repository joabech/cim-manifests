# # Common package lists using YAML anchors for DRY
ubuntu_packages: &ubuntu_pkgs
  - build-essential
  - cmake
  - curl
  - git
  - libboost-all-dev
  - libssl-dev
  - pkg-config
  - python3
  - python3-pip
  - vim


fedora_packages: &fedora_pkgs
  - boost-devel
  - cmake
  - curl
  - gcc
  - gcc-c++
  - git
  - openssl-devel
  - pkgconfig
  - python3
  - python3-pip
  - vim


# Linux x86_64 (Intel/AMD) dependencies
linux-x86_64:
  ubuntu-24.04:
    command: "apt install"
    packages: *ubuntu_pkgs

  ubuntu-22.04:
    command: "apt install"
    packages: *ubuntu_pkgs
  
  fedora-43:
    command: "dnf install"
    packages: *fedora_pkgs
  
  fedora-42:
    command: "dnf install"
    packages: *fedora_pkgs


# Linux ARM64 (Apple Silicon, ARM servers) dependencies  
linux-aarch64:
  ubuntu-24.04:
    command: "apt install"
    packages: *ubuntu_pkgs

  ubuntu-22.04:
    command: "apt install"
    packages: *ubuntu_pkgs
  
  fedora-43:
    command: "dnf install"
    packages: *fedora_pkgs
  
  fedora-42:
    command: "dnf install"
    packages: *fedora_pkgs


# Backward compatibility - generic linux (defaults to x86_64 behavior)
linux:
  ubuntu-24.04:
    command: "apt install"
    packages: *ubuntu_pkgs

  ubuntu-22.04:
    command: "apt install"
    packages: *ubuntu_pkgs
  
  fedora-43:
    command: "dnf install"
    packages: *fedora_pkgs
  
  fedora-42:
    command: "dnf install"
    packages: *fedora_pkgs


macos:
  macos-any:
    command: "brew install"
    packages:
      - cmake
      - git
      - python3
      - vim
