mirror: $HOME/tmp/mirror

makefile_include:
  - include extra.mk

copy_files:
  - source: extra.mk
    dest: extra.mk

toolchains:
  # Example: ARM GNU Toolchain for aarch32 (macOS ARM64)
  - name: arm-gnu-toolchain-14.3.rel1-darwin-arm64-arm-none-eabi.tar.xz
    url: https://developer.arm.com/-/media/Files/downloads/gnu/14.3.rel1/binrel/
    destination: toolchains/aarch32
    strip_components: 1
    os: darwin
    arch: arm64

  # Example: Rust toolchain with post-install commands
  # This demonstrates a simple toolchain with custom setup commands
  - name: rust-example.sh
    url: https://raw.githubusercontent.com/rust-lang/rustup/master/
    destination: opt/rust
    post_install_commands:
      - "echo 'Rust toolchain setup example'"
      - "echo 'In real scenario, rustup.sh would be executed here'"
      - "echo 'Environment setup would follow'"

envsetup:
  - "@echo \"Setting up dummy example 01\""

gits:
  - name: git-sandbox
    url: https://github.com/kevin-bates/git-sandbox.git
    commit: master
    build:
      - "@echo \"Building git-sandbox 01\""
      - make all
