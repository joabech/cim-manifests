# OS Dependencies for U-Boot ARM64 Build
#
# Required packages for building and running U-Boot with ARM64 cross-compiler
# toolchain and QEMU emulation.
#
# Build tools:
#   - bison/flex for Kconfig
#   - device-tree-compiler for DTB generation
#   - OpenSSL for verified boot
#
# QEMU emulation:
#   - qemu-system-arm (Ubuntu/Debian) or qemu-system-aarch64 (Fedora)
#   - Provides qemu-system-aarch64 for running U-Boot

# Common package lists using YAML anchors for DRY
ubuntu_packages: &ubuntu_pkgs
  - bc                    # Basic calculator for build scripts
  - bison                 # Parser generator (Kconfig)
  - build-essential       # gcc, g++, make, etc.
  - ccache                # Compiler cache for faster rebuilds
  - curl
  - device-tree-compiler  # dtc - device tree compiler
  - flex                  # Lexical analyzer (Kconfig)
  - git
  - libncurses-dev        # For menuconfig
  - libssl-dev            # For crypto/verified boot support
  - make
  - python3
  - python3-pip
  - python3-setuptools
  - qemu-system-arm       # QEMU system emulation for ARM (provides qemu-system-aarch64)
  - wget

fedora_packages: &fedora_pkgs
  - bc
  - bison
  - ccache                # Compiler cache for faster rebuilds
  - curl
  - dtc                   # device-tree-compiler
  - flex
  - gcc
  - gcc-c++
  - git
  - make
  - ncurses-devel
  - openssl-devel
  - python3
  - python3-pip
  - qemu-system-aarch64   # QEMU system emulation for ARM64
  - wget

# Linux x86_64 (Intel/AMD) dependencies
linux-x86_64:
  ubuntu-24.04:
    command: "apt install"
    packages: *ubuntu_pkgs

  ubuntu-22.04:
    command: "apt install"
    packages: *ubuntu_pkgs

  fedora-43:
    command: "dnf install"
    packages: *fedora_pkgs

  fedora-42:
    command: "dnf install"
    packages: *fedora_pkgs

# Linux ARM64 (Apple Silicon, ARM servers) dependencies
linux-aarch64:
  ubuntu-24.04:
    command: "apt install"
    packages: *ubuntu_pkgs

  ubuntu-22.04:
    command: "apt install"
    packages: *ubuntu_pkgs

  fedora-43:
    command: "dnf install"
    packages: *fedora_pkgs

  fedora-42:
    command: "dnf install"
    packages: *fedora_pkgs

# Backward compatibility - generic linux (defaults to x86_64 behavior)
linux:
  ubuntu-24.04:
    command: "apt install"
    packages: *ubuntu_pkgs

  ubuntu-22.04:
    command: "apt install"
    packages: *ubuntu_pkgs

  fedora-43:
    command: "dnf install"
    packages: *fedora_pkgs

  fedora-42:
    command: "dnf install"
    packages: *fedora_pkgs

# macOS dependencies
#
# Bash on macOS: U-Boot's build scripts require modern bash features (shopt lastpipe).
# The system /bin/bash (3.x) is too old. Homebrew provides bash 5.3.x which the
# build system automatically uses by prepending /opt/homebrew/bin to PATH.
#
# OpenSSL on macOS: Homebrew installs openssl@3 to /opt/homebrew/opt/openssl@3.
# The build system automatically detects this and configures the correct include/lib
# paths via HOSTCFLAGS and HOSTLDFLAGS.
# If you manually installed openssl instead of openssl@3, reinstall with:
#   brew uninstall openssl
#   brew install openssl@3
macos:
  macos-any:
    command: "brew install"
    packages:
      - bash       # Modern bash with shopt support (required for U-Boot build scripts)
      - bison
      - bc
      - ccache    # Compiler cache for faster rebuilds
      - curl
      - dtc
      - flex
      - git
      - make
      - ncurses
      - openssl@3 # Required for U-Boot verified boot/image signing tools
      - python3
      - qemu      # QEMU system emulation (includes qemu-system-aarch64)
      - wget
