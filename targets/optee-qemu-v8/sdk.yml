################################################################################
# Default mirror location (can be overridden by user: cim config -e)
################################################################################
mirror: $HOME/tmp/mirror


################################################################################
# Toolchains section - download and install toolchains
################################################################################
toolchains:
  # Arm GNU toolchain for aarch32 (32-bit ARM) - version 11.3 (from build/toolchain.mk)
  - name: arm-gnu-toolchain-11.3.rel1-x86_64-arm-none-linux-gnueabihf.tar.xz
    url: https://developer.arm.com/-/media/Files/downloads/gnu/11.3.rel1/binrel/
    destination: toolchains/aarch32
    strip_components: 1
    os: linux
    arch: x86_64
    post_install_commands: |
      cd bin && for f in *-none-linux*; do ln -sf "$f" "${f//-none}"; done

  # Arm GNU toolchain for aarch64 (64-bit ARM) - version 11.3 (from build/toolchain.mk)
  - name: arm-gnu-toolchain-11.3.rel1-x86_64-aarch64-none-linux-gnu.tar.xz
    url: https://developer.arm.com/-/media/Files/downloads/gnu/11.3.rel1/binrel/
    destination: toolchains/aarch64
    strip_components: 1
    os: linux
    arch: x86_64
    post_install_commands: |
      cd bin && for f in *-none-linux*; do ln -sf "$f" "${f//-none}"; done

  # Rust toolchain - downloads rustup installer script and runs it with isolated environment
  # The environment variables ensure Rust installs only in the toolchain directory:
  # - Direct mode: installs to workspace/toolchains/rust/.cargo and .rustup
  # - Symlink mode (--symlink): installs to mirror/toolchains/{name}/.cargo and .rustup
  - url: https://sh.rustup.rs
    destination: toolchains/rust
    environment:
      # $PWD expands to the actual installation directory (workspace or mirror)
      CARGO_HOME: "$PWD/.cargo"
      RUSTUP_HOME: "$PWD/.rustup"
      # Prepend cargo bin to PATH so rustup commands work during installation
      PATH: "$PWD/.cargo/bin:$PATH"
    post_install_commands: |
      set -e
      mkdir -p .cargo .rustup
      bash ./sh.rustup.rs -y --no-modify-path
      echo "Installing stable Rust toolchain..."
      .cargo/bin/rustup default stable
      echo "Rust toolchain installed to $RUSTUP_HOME"
      .cargo/bin/cargo --version


################################################################################
# Makefile - build targets
################################################################################
# OP-TEE do NOT want to use qemu.mk from the QEMU git and do not want to use
# trusted-services.mk from the trusted-services git. Hence add them to the
# exclude list so they are not copied into the build/ folder automatically.
makefile_include:
  exclude:
    - qemu
    - trusted-services

envsetup:
  - ln -sf qemu_v8.mk build/Makefile
  - cd build && git am ../patches/build/*.patch || true
  - cd optee_rust && git am ../patches/optee_rust/*.patch || true

build:
  - $(MAKE) -C build all $(MAKEFLAGS)

test:
  - $(MAKE) -C build check $(MAKEFLAGS)

clean:
  - $(MAKE) -C build clean $(MAKEFLAGS)

flash: |
  @echo "This is a QEMU setup, no flashing needed"


################################################################################
# Copy files section - download files to be used during installation
################################################################################
copy_files:
  - source: llm/CLAUDE.md
    dest: CLAUDE.md
  - source: patches/build/*.patch
    dest: patches/build/
  - source: patches/optee_rust/*.patch
    dest: patches/optee_rust/


###############################################################################
# Gits
################################################################################
gits:
  - name: build
    url: https://github.com/OP-TEE/build.git
    commit: refs/tags/4.8.0
    build:
      - make -C build -j`nproc` $(MAKEFLAGS)

  - name: optee_docs
    url: https://github.com/OP-TEE/optee_docs.git
    commit: 4.8.0

  - name: optee_client
    url: https://github.com/OP-TEE/optee_client.git
    commit: 4.8.0
    depends_on:
      - optee_os
    build:
      - make -C build optee-client $(MAKEFLAGS)

  - name: optee_os
    url: https://github.com/OP-TEE/optee_os.git
    commit: 4.8.0
    build:
      - make -C build optee-os $(MAKEFLAGS)

  - name: optee_ftpm
    url: https://github.com/OP-TEE/optee_ftpm.git
    commit: 4.8.0
    depends_on:
      - optee_os

  - name: optee_test
    url: https://github.com/OP-TEE/optee_test.git
    commit: 4.8.0
    depends_on:
      - optee_os

  # linaro-swg gits from common.xml
  - name: linux
    url: https://github.com/linaro-swg/linux.git
    commit: refs/tags/optee-4.8.0
    build:
      - make -C build linux $(MAKEFLAGS)

  - name: optee_examples
    url: https://github.com/linaro-swg/optee_examples.git
    commit: 4.8.0
    depends_on:
      - optee_os
      - optee_client

  # buildroot git from common.xml
  - name: buildroot
    url: https://github.com/buildroot/buildroot.git
    commit: refs/tags/2025.05
    build:
      - make -C build buildroot $(MAKEFLAGS)

  # fTPM implementation from common.xml
  - name: ms-tpm-20-ref
    url: https://github.com/microsoft/ms-tpm-20-ref.git
    commit: 98b60a44aba79b15fcce1c0d1e46cf5918400f6a
    build:
      - make -C build ftpm $(MAKEFLAGS)

  # Misc gits from qemu_v8.xml
  - name: optee_rust
    url: https://github.com/apache/incubator-teaclave-trustzone-sdk.git
    commit: a8cb34150770ba729b2cc9b3c1d7c014bd32d95b

  - name: qemu
    url: https://github.com/qemu/qemu.git
    commit: refs/tags/v10.0.0
    build:
      - make -C build qemu $(MAKEFLAGS)

  - name: hafnium
    url: https://github.com/TF-Hafnium/hafnium.git
    commit: refs/tags/v2.12
    build:
      - make -C build hafnium $(MAKEFLAGS)

  - name: trusted-firmware-a
    url: https://github.com/TrustedFirmware-A/trusted-firmware-a.git
    commit: refs/tags/v2.13-rc0
    build:
      - make -C build arm-tf $(MAKEFLAGS)

  - name: mbedtls
    url: https://github.com/Mbed-TLS/mbedtls.git
    commit: refs/tags/mbedtls-3.6.0

  - name: u-boot
    url: https://github.com/u-boot/u-boot.git
    commit: refs/tags/v2025.07
    build:
      - make -C build u-boot $(MAKEFLAGS)

  - name: xen
    url: https://github.com/xen-project/xen.git
    commit: refs/tags/RELEASE-4.20.0
    build:
      - make -C build xen $(MAKEFLAGS)

  - name: SCP-firmware
    url: https://github.com/linaro-swg/SCP-firmware.git
    commit: refs/tags/v2.16.0

  - name: trusted-services
    url: https://git.trustedfirmware.org/TS/trusted-services.git
    commit: 8881aaa3a9cb21e8b869e28c1a079f02fa46fd6c

  - name: linux-arm-ffa-user
    url: https://github.com/linaro-swg/linux-trusted-services.git
    commit: refs/tags/debugfs-v5.0.2
