# Linux x86_64 (Intel/AMD) dependencies
linux-x86_64:
  ubuntu-24.04:
    command: "apt install"
    packages: *ubuntu_packages

  ubuntu-22.04:
    command: "apt install"
    packages: *ubuntu_packages

  fedora-43:
    command: "dnf install"
    packages: *fedora_packages
  
  fedora-42:
    command: "dnf install"
    packages: *fedora_packages


# Linux ARM64 (Apple Silicon, ARM servers) dependencies  
linux-aarch64:
  ubuntu-24.04:
    command: "apt install"
    packages: *ubuntu_packages

  ubuntu-22.04:
    command: "apt install"
    packages: *ubuntu_packages

  fedora-43:
    command: "dnf install"
    packages: *fedora_packages
  
  fedora-42:
    command: "dnf install"
    packages: *fedora_packages
 

# Linux legacy
linux:
  ubuntu-24.04:
    command: "apt install"
    packages: *ubuntu_packages

  ubuntu-22.04:
    command: "apt install"
    packages: *ubuntu_packages

  fedora-43:
    command: "dnf install"
    packages: *fedora_packages
  
  fedora-42:
    command: "dnf install"
    packages: *fedora_packages


# MacOS dependencies
# Note that you cannot build OP-TEE QEMU v8 on MacOS natively,
macos:
  macos-any:
    command: "brew install"
    packages:
      # Base packages
      - cmake
      - git
      - python3
      - vim
      # OP-TEE specific packages
      - dtc
      - glib
      - pixman
      - gnu-getopt
      - coreutils
      - aarch64-elf-gcc
      - arm-none-eabi-gcc
