macos:
  macos:
    version: "any"
    command: "brew install"
    packages:
      # Base packages
      - cmake
      - git
      - python3
      - vim
      # OP-TEE specific packages
      - dtc
      - glib
      - pixman
      - gnu-getopt
      - coreutils
      - aarch64-elf-gcc
      - arm-none-eabi-gcc
