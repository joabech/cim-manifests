# OP-TEE QEMU v8 specific OS dependencies
# Includes base dependencies plus OP-TEE-specific packages

# Linux x86_64 (Intel/AMD) dependencies
linux-x86_64:
  ubuntu:
    version: "22.04"
    command: "apt-get install"
    packages:
      # Base packages
      - build-essential
      - cmake
      - curl
      - git
      - libboost-all-dev
      - libssl-dev
      - pkg-config
      - python3
      - python3-pip
      - vim
      # OP-TEE specific packages
      - device-tree-compiler
      - uuid-dev
      - libguestfs-tools
      - genisoimage
      - expect
      - cpio
      - android-tools-adb
      - android-tools-fastboot
      - autoconf
      - libtool
      - libglib2.0-dev
      - libpixman-1-dev
      - bc
      - bison
      - flex
      - gcc-aarch64-linux-gnu
      - gcc-arm-linux-gnueabihf
  
  fedora:
    version: "42"
    command: "dnf install"
    packages:
      # Base packages
      - cmake
      - curl
      - gcc
      - gcc-c++
      - git
      - boost-devel
      - openssl-devel
      - pkgconfig
      - python3
      - python3-pip
      - vim
      # OP-TEE specific packages
      - dtc
      - libuuid-devel
      - guestfs-tools
      - genisoimage
      - expect
      - cpio
      - android-tools
      - autoconf
      - libtool
      - glib2-devel
      - pixman-devel
      - bc
      - bison
      - flex
      - gcc-aarch64-linux-gnu
      - gcc-arm-linux-gnu

