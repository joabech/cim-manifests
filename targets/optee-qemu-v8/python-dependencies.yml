profiles:
  # Documentation profile - packages for building and serving docs
  docs:
    packages:
      - graphviz
      - myst-parser
      - plantuml
      - sphinx
      - sphinx-autobuild
      - sphinx-rtd-theme
      
  # Development profile
  dev:
    packages:
      - pycryptodome
      - pyserial
      
  # Full profile - everything
  full:
    packages:
      - cryptography
      - ecdsa
      - mypy
      - pre-commit
      - pycryptodome
      - pyserial

# Default profile to use when none specified
default: docs
