# OS Dependencies for ZynqMP Boot Binary Builder
#
# NOTE: This manifest requires Xilinx Vitis/Vivado tools (xsct, bootgen) to be
# installed separately. These tools are not available via package managers.
#
# Install Xilinx tools from: https://www.xilinx.com/support/download.html, then
# source the settings:
# $ source /opt/Xilinx/Vivado/2025.1/settings64.sh

# Common package lists using YAML anchors for DRY
ubuntu_packages: &ubuntu_pkgs
  - build-essential
  - ccache
  - curl
  - device-tree-compiler
  - g++
  - gcc
  - git
  - libelf-dev
  - make
  - python3
  - python3-pip
  - u-boot-tools
  - unzip
  - wget

fedora_packages: &fedora_pkgs
  - ccache
  - curl
  - dtc
  - elfutils-libelf-devel
  - gcc
  - gcc-c++
  - git
  - make
  - python3
  - python3-pip
  - uboot-tools
  - unzip
  - wget


# Linux x86_64 (Intel/AMD) dependencies
linux-x86_64:
  ubuntu-24.04:
    command: "apt install"
    packages: *ubuntu_pkgs

  ubuntu-22.04:
    command: "apt install"
    packages: *ubuntu_pkgs

  fedora-43:
    command: "dnf install"
    packages: *fedora_pkgs

  fedora-42:
    command: "dnf install"
    packages: *fedora_pkgs

 
# Linux ARM64 (Apple Silicon, ARM servers) dependencies
linux-aarch64:
  ubuntu-24.04:
    command: "apt install"
    packages: *ubuntu_pkgs

  ubuntu-22.04:
    command: "apt install"
    packages: *ubuntu_pkgs

  fedora-43:
    command: "dnf install"
    packages: *fedora_pkgs

  fedora-42:
    command: "dnf install"
    packages: *fedora_pkgs


# Backward compatibility - generic linux (defaults to x86_64 behavior)
linux:
  ubuntu-24.04:
    command: "apt install"
    packages: *ubuntu_pkgs

  ubuntu-22.04:
    command: "apt install"
    packages: *ubuntu_pkgs

  fedora-43:
    command: "dnf install"
    packages: *fedora_pkgs

  fedora-42:
    command: "dnf install"
    packages: *fedora_pkgs


# Note: Linux kernel builds require a Linux host due to build tooling
# dependencies. Use a Linux machine or VM to build the kernel. Other components
# (TF-A, U-Boot) build fine on macOS.
macos:
  macos-any:
    command: "brew install"
    packages:
      - git
      - make
      - wget
      - curl
      - unzip
      - ccache       # Compiler cache for faster rebuilds
      - dtc
      - u-boot-tools # mkimage for boot.scr
      - coreutils    # GNU coreutils (dd) for U-Boot SPL build
      - python3
