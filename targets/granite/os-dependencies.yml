# Common package lists using YAML anchors for DRY
ubuntu_packages: &ubuntu_pkgs
  - git
  - python3
  - python3-pip
  - vim

fedora_packages: &fedora_pkgs
  - git
  - python3
  - python3-pip
  - vim

# Linux x86_64 (Intel/AMD) dependencies
linux-x86_64:
  ubuntu:
    version: "22.04"
    command: "apt-get install"
    packages: *ubuntu_pkgs
  
  fedora:
    version: "42"
    command: "dnf install"
    packages: *fedora_pkgs

# Linux ARM64 (Apple Silicon, ARM servers) dependencies  
linux-aarch64:
  ubuntu:
    version: "22.04"
    command: "apt-get install"
    packages: *ubuntu_pkgs
  
  fedora:
    version: "42"
    command: "dnf install"
    packages: *fedora_pkgs

# Backward compatibility - generic linux (defaults to x86_64 behavior)
linux:
  ubuntu:
    version: "22.04"
    command: "apt-get install"
    packages: *ubuntu_pkgs
  
  fedora:
    version: "42"
    command: "dnf install"
    packages: *fedora_pkgs

macos:
  macos:
    version: "any"
    command: "brew install"
    packages:
      - git
      - python3
      - vim
