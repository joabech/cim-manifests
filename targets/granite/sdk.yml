################################################################################
# Toolchains section - downloads and extracts toolchains with optional post-install
################################################################################
# NOTE: This section demonstrates how to migrate complex toolchains from the
# "install" section. The toolchains section supports:
# - Download variants based on OS/architecture
# - Symlink installation (--symlink flag) for sharing across workspaces
# - Mirror-based caching to avoid re-downloading
# - Post-install commands for complex setup
#
# Example migration of Rust from "install" to "toolchains":
#
# toolchains:
#   # Rust with post-install commands to set up environment
#   - name: rustup.sh
#     url: https://sh.rustup.rs/
#     destination: opt/rust
#     post_install_commands:
#       - "CARGO_HOME=opt/cargo RUSTUP_HOME=opt/rustup bash rustup.sh -y --default-toolchain 1.86 --no-modify-path"
#       - ". opt/cargo/env && cargo install uefi-run --root ."
#       - ". opt/cargo/env && rustup target add riscv32i-unknown-none-elf riscv64imac-unknown-none-elf thumbv6m-none-eabi thumbv7em-none-eabi thumbv7m-none-eabi thumbv8m.main-none-eabi x86_64-unknown-none"
#
# Benefits over "install" section:
# - Leverages download variants (OS/arch filtering)
# - Supports --symlink for workspace reuse
# - Post-install commands only run during actual extraction, not on symlink reuse
# - Better integration with mirror-based caching

################################################################################
# Installation section - binaries etc, with specific install commands
################################################################################
install:
  # FIXME: Could and should use git directly
  - name: ninja
    sentinel: opt/.ninja-installed
    commands:
      - "mkdir -p opt bin"
      - "tar xf downloads/ninja-1.11.1.g95dee.kitware.jobserver-1_x86_64-linux-gnu.tar.gz -C opt"
      - "ln -sf ../opt/ninja-1.11.1.g95dee.kitware.jobserver-1_x86_64-linux-gnu/ninja bin/ninja"

  # FIXME: Could and should use git directly
  - name: ccache
    sentinel: opt/.ccache-installed
    commands:
      - "mkdir -p opt bin"
      - "tar xf downloads/ccache-4.9.1-linux-x86_64.tar.xz -C opt"
      - "ln -sf ../opt/ccache-4.9.1-linux-x86_64/ccache bin/ccache"

  # FIXME: Could and should use git directly
  - name: doxygen
    sentinel: opt/.doxygen-installed
    commands:
      - "mkdir -p opt bin"
      - "tar xf downloads/doxygen-1.14.0.linux.bin.tar.gz -C opt"
      - "ln -sf ../opt/doxygen-1.14.0/bin/doxygen bin/doxygen"

  # FIXME: Could and should use git directly
  - name: protoc
    commands: |
      @mkdir -p opt/protoc bin
      @cd opt/protoc && unzip -q -o ../../downloads/protoc-21.7-linux-x86_64.zip
      @ln -sf ../opt/protoc/bin/protoc bin/protoc

  # FIXME: Could and should use git directly
  - name: renode
    sentinel: opt/.renode-installed
    commands:
      - "mkdir -p opt/renode"
      - "tar xf downloads/renode-1.15.3.linux-portable-dotnet.tar.gz -C opt/renode --strip-components=1"

  - name: ad71260-vp
    sentinel: opt/.ad71260-vp-installed
    commands: |
      DOWNLOADS="../../downloads"
      mkdir -p opt/vp
      cd opt/vp && unzip -q -o $$DOWNLOADS/ad71260_vplatform_v3.0.2_rc.zip

  - name: fastdsp-asm
    sentinel: opt/.fastdsp-asm-installed
    commands: |
      DOWNLOADS="downloads"
      FASTDSP_DIR="opt/fastdsp-assembler"
      mkdir -p $$FASTDSP_DIR bin
      tar xf $$DOWNLOADS/fastdsp-assembler-linux-generic-v1.0.9.tar -C $$FASTDSP_DIR --strip-components=1
      ln -sf ../$$FASTDSP_DIR/fastdsp-assembler bin/fastdsp-assembler


  - name: fastmodels
    depends_on:
      - ad71260-vp
    sentinel: opt/.fastmodels-installed
    commands: |
      DOWNLOADS="downloads"
      FM_DIR="opt/vp"
      FM_ARCHIVE="FastModels_11-19-014_Linux64.tgz"
      FM_PATH="$$FM_DIR/ad71260_vplatform_v3.0.2_rc/linux/AD71260Platform/bin"
      mkdir -p $$FM_DIR
      (cd $$FM_DIR && tar xf ../../$$DOWNLOADS/$$FM_ARCHIVE)
      if [ "$$(uname -s)" = "Linux" ]; then
        (cd $$FM_DIR/FastModels_11-19-014_Linux64 && ./setup.sh --i-accept-the-end-user-license-agreement --basepath ../ARM)
      else
        echo "Warning: fastmodels not fully installed (Linux-specific setup.sh skipped on $$(uname -s))"
      fi
      mkdir -p $$FM_PATH
      cp $$DOWNLOADS/armlm-ipc $$FM_PATH/
      chmod +x $$FM_PATH/armlm-ipc
      cp $$DOWNLOADS/libarmlm.so $$FM_PATH/

  # FIXME: This installs its own Python virtual environment, shouldn't be needed.
  - name: granite-vp
    sentinel: opt/.granite-vp-installed
    commands: |
      DOWNLOADS="../../downloads"
      GRANITE_DIR="opt/vp/granite_vplatform_v0.4.1"
      mkdir -p opt/vp
      cd opt/vp && unzip -q -o $$DOWNLOADS/Adi.Dbu.Tahoe.VP-0.4.1-Linux.zip -d granite_vplatform_v0.4.1
      cd $$GRANITE_DIR && python3 -m venv venv
      cd $$GRANITE_DIR && . venv/bin/activate && pip install -q -r metadata/requirements.txt
      cd $$GRANITE_DIR/content/scripts && touch granite_vp && chmod +x granite_vp

  - name: sbt
    sentinel: opt/.sbt-installed
    commands: |
      DOWNLOADS="../../downloads"
      SBT_DIR="opt/sbt"
      mkdir -p $$SBT_DIR
      cd $$SBT_DIR && unzip -q -o $$DOWNLOADS/sbt-3.1.0.zip

  - name: rust
    sentinel: opt/.rust-installed
    commands: |
      DOWNLOADS="downloads"
      CARGO_HOME="opt/cargo"
      RUSTUP_HOME="opt/rustup"
      mkdir -p $$CARGO_HOME $$RUSTUP_HOME
      export CARGO_HOME RUSTUP_HOME
      bash $$DOWNLOADS/rustup.sh -y --default-toolchain 1.86 --no-modify-path
      . $$CARGO_HOME/env && cargo install uefi-run --root .
      . $$CARGO_HOME/env && rustup target add riscv32i-unknown-none-elf riscv64imac-unknown-none-elf thumbv6m-none-eabi thumbv7em-none-eabi thumbv7m-none-eabi thumbv8m.main-none-eabi x86_64-unknown-none

  - name: xtensa-tools
    sentinel: opt/.xtensa-tools-installed
    commands: |
      DOWNLOADS="downloads"
      VP_DIR="opt/vp"
      RJ_DIR="$$VP_DIR/RJ-2024.4-linux"
      mkdir -p $$VP_DIR
      (cd $$VP_DIR && tar xf ../../$$DOWNLOADS/XtensaTools_RJ_2024_4_linux.tgz)
      (cd $$VP_DIR && tar xf ../../$$DOWNLOADS/XtensaTools_RJ_2024_4_patch943452_linux.tgz)
      (cd $$VP_DIR && tar xf ../../$$DOWNLOADS/H5V4_NPUV3_RJ24_4P1_linux.tgz)
      (cd $$VP_DIR && tar xf ../../$$DOWNLOADS/H5V4_RJ24_4P1_linux.tgz)
      (cd $$VP_DIR && tar xf ../../$$DOWNLOADS/H5sTV1_RJ24_04_linux.tgz)
      if [ "$$(uname -s)" = "Linux" ] && [ "$$(uname -m)" = "x86_64" ]; then
        (cd $$RJ_DIR/H5V4_NPUV3_RJ24_4P1 && ./install --xtensa-tools ../XtensaTools/ --no-replace)
        (cd $$RJ_DIR/H5V4_RJ24_4P1 && ./install --xtensa-tools ../XtensaTools/ --no-replace)
        (cd $$RJ_DIR/H5sTV1_RJ24_04 && ./install --xtensa-tools ../XtensaTools/ --no-replace)
        patch -R $$RJ_DIR/H5V4_RJ24_4P1/xtensa-elf/include/stdatomic.h $$DOWNLOADS/stdatomic_h.patch
        patch -R $$RJ_DIR/H5V4_NPUV3_RJ24_4P1/xtensa-elf/include/stdatomic.h $$DOWNLOADS/stdatomic_h.patch
        patch -R $$RJ_DIR/H5sTV1_RJ24_04/xtensa-elf/include/stdatomic.h $$DOWNLOADS/stdatomic_h.patch
      else
        echo "Warning: xtensa-tools not fully installed (x86_64 Linux-specific install scripts and patches skipped on $$(uname -s)/$$(uname -m))"
      fi

  # FIXME: We probably could and should use the <workspace>/toolchains folder
  - name: zephyr-sdk
    sentinel: opt/.zephyr-sdk-installed
    commands: |
      DOWNLOADS="../../downloads"
      TOOLCHAINS_DIR="opt/toolchains"
      ZEPHYR_DIR="$$TOOLCHAINS_DIR/zephyr-sdk-0.17.2"
      ARCH=$$(uname -m)
      mkdir -p $$TOOLCHAINS_DIR
      if [ "$$ARCH" = "x86_64" ]; then
        (cd $$TOOLCHAINS_DIR && tar xf $$DOWNLOADS/zephyr-sdk-0.17.2_linux-x86_64.tar.xz)
      elif [ "$$ARCH" = "aarch64" ]; then
        (cd $$TOOLCHAINS_DIR && tar xf $$DOWNLOADS/zephyr-sdk-0.17.2_linux-aarch64.tar.xz)
      else
        echo "Error: Unsupported architecture $$ARCH for zephyr-sdk"
        exit 1
      fi
      if [ "$$(uname -s)" = "Linux" ]; then
        (cd $$ZEPHYR_DIR && ./setup.sh -t all -h -c)
      else
        echo "Warning: zephyr-sdk not fully installed (Linux-specific setup.sh skipped on $$(uname -s))"
      fi

  # Install LLVM/Clang
  - name: llvm
    sentinel: opt/.llvm-installed
    commands: |
      DOWNLOADS="downloads"
      if [ "$$(uname -s)" = "Linux" ]; then
        chmod +x $$DOWNLOADS/llvm.sh
        sudo $$DOWNLOADS/llvm.sh 21 all
      else
        echo "Warning: llvm not installed (Linux-specific installation skipped on $$(uname -s))"
      fi

  # Install JLink
  - name: jlink
    sentinel: opt/.jlink-installed
    commands: |
      DOWNLOADS="downloads"
      if [ "$$(uname -s)" = "Linux" ] && [ "$$(uname -m)" = "x86_64" ]; then
        sudo dpkg --unpack $$DOWNLOADS/jlink_setup.deb
        sudo rm -f /var/lib/dpkg/info/jlink.postinst
        sudo dpkg --configure jlink
        sudo apt install -yf
      else
        echo "Warning: jlink not installed (Linux x86_64-specific installation skipped on $$(uname -s)/$$(uname -m))"
      fi

  # Install JLink Configurations for Walleye
  - name: jlink-walleye-config
    depends_on:
      - jlink
    sentinel: opt/.jlink-walleye-config-installed
    commands: |
      CONFIG_DIR="$$HOME/.config/SEGGER"
      mkdir -p $$CONFIG_DIR
      (cd $$CONFIG_DIR && tar xf $(pwd)/downloads/jlink-enablement-main.tar.gz)
      (cd $$CONFIG_DIR && mv Analog/MAX32657 JLinkDevices)
      (cd $$CONFIG_DIR && rm -rf Analog/)

  # Install JLink Configurations for Granite
  - name: jlink-granite-config
    depends_on:
      - jlink
    sentinel: opt/.jlink-granite-config-installed
    commands: |
      CONFIG_DIR="$$HOME/.config/SEGGER"
      mkdir -p $$CONFIG_DIR
      (cd $$CONFIG_DIR && tar xf $(pwd)/downloads/jlink-enablement-milestone-granite-110.tar.gz)
      (cd $$CONFIG_DIR && mv Analog/ADAU2042 JLinkDevices)
      (cd $$CONFIG_DIR && rm -rf Analog/)

  # Install OpenOCD for Walleye
  - name: openocd
    sentinel: opt/.openocd-installed
    commands: |
      DOWNLOADS="downloads"
      OPENOCD_DIR="opt/openocd"
      mkdir -p $$OPENOCD_DIR
      (cd $$OPENOCD_DIR && unzip -q -o ../../$$DOWNLOADS/openocd-milestone-walleye-Linux64-release-96.zip)

  # Install Corestone FVP models (x86_64 and aarch64)
  - name: corestone-fvp
    sentinel: opt/.corestone-fvp-installed
    commands: |
      DOWNLOADS="downloads"
      FVP_DIR="opt/fvps"
      WORKSPACE_ROOT="$$(pwd)"
      mkdir -p $$FVP_DIR bin
      if [ "$$(uname -s)" = "Linux" ] && [ "$$(uname -m)" = "x86_64" ]; then
        # Install Corestone 300 (x86_64)
        (cd $$FVP_DIR && tar xf ../../$$DOWNLOADS/FVP_Corstone_SSE-300_11.27_42_Linux64.tgz)
        (cd $$FVP_DIR && ./FVP_Corstone_SSE-300.sh --no-interactive --i-agree-to-the-contained-eula -d $$WORKSPACE_ROOT/$$FVP_DIR/Corstone-300)
        (cd $$FVP_DIR && rm FVP_Corstone_SSE-300.sh)
        # Install Corestone 310 (x86_64)
        (cd $$FVP_DIR && tar xf ../../$$DOWNLOADS/FVP_Corstone_SSE-310_11.27_42_Linux64.tgz)
        (cd $$FVP_DIR && ./FVP_Corstone_SSE-310.sh --no-interactive --i-agree-to-the-contained-eula -d $$WORKSPACE_ROOT/$$FVP_DIR/Corstone-310)
        (cd $$FVP_DIR && rm FVP_Corstone_SSE-310.sh)
        # Install Corestone 315 (x86_64)
        (cd $$FVP_DIR && tar xf ../../$$DOWNLOADS/FVP_Corstone_SSE-315_11.27_42_Linux64.tgz)
        (cd $$FVP_DIR && ./FVP_Corstone_SSE-315.sh --no-interactive --i-agree-to-the-contained-eula -d $$WORKSPACE_ROOT/$$FVP_DIR/Corstone-315)
        (cd $$FVP_DIR && rm FVP_Corstone_SSE-315.sh)
        # Install Corestone 320 (x86_64)
        (cd $$FVP_DIR && tar xf ../../$$DOWNLOADS/FVP_Corstone_SSE-320_11.27_25_Linux64.tgz)
        (cd $$FVP_DIR && ./FVP_Corstone_SSE-320.sh --no-interactive --i-agree-to-the-contained-eula -d $$WORKSPACE_ROOT/$$FVP_DIR/Corstone-320)
        (cd $$FVP_DIR && rm FVP_Corstone_SSE-320.sh)
        # Create symlinks to binaries
        (cd bin && ln -sf ../$$FVP_DIR/Corstone-300/models/*/FVP_* .)
        (cd bin && ln -sf ../$$FVP_DIR/Corstone-310/models/*/FVP_* .)
        (cd bin && ln -sf ../$$FVP_DIR/Corstone-315/models/*/FVP_* .)
        (cd bin && ln -sf ../$$FVP_DIR/Corstone-320/models/*/FVP_* .)
      elif [ "$$(uname -s)" = "Linux" ] && [ "$$(uname -m)" = "aarch64" ]; then
        # Install Corestone 300 (aarch64)
        (cd $$FVP_DIR && tar xf ../../$$DOWNLOADS/FVP_Corstone_SSE-300_11.27_42_Linux64_armv8l.tgz)
        (cd $$FVP_DIR && ./FVP_Corstone_SSE-300.sh --no-interactive --i-agree-to-the-contained-eula -d $$WORKSPACE_ROOT/$$FVP_DIR/Corstone-300)
        (cd $$FVP_DIR && rm FVP_Corstone_SSE-300.sh)
        # Install Corestone 310 (aarch64)
        (cd $$FVP_DIR && tar xf ../../$$DOWNLOADS/FVP_Corstone_SSE-310_11.27_42_Linux64_armv8l.tgz)
        (cd $$FVP_DIR && ./FVP_Corstone_SSE-310.sh --no-interactive --i-agree-to-the-contained-eula -d $$WORKSPACE_ROOT/$$FVP_DIR/Corstone-310)
        (cd $$FVP_DIR && rm FVP_Corstone_SSE-310.sh)
        # Install Corestone 315 (aarch64)
        (cd $$FVP_DIR && tar xf ../../$$DOWNLOADS/FVP_Corstone_SSE-315_11.27_42_Linux64_armv8l.tgz)
        (cd $$FVP_DIR && ./FVP_Corstone_SSE-315.sh --no-interactive --i-agree-to-the-contained-eula -d $$WORKSPACE_ROOT/$$FVP_DIR/Corstone-315)
        (cd $$FVP_DIR && rm FVP_Corstone_SSE-315.sh)
        # Install Corestone 320 (aarch64)
        (cd $$FVP_DIR && tar xf ../../$$DOWNLOADS/FVP_Corstone_SSE-320_11.27_25_Linux64_armv8l.tgz)
        (cd $$FVP_DIR && ./FVP_Corstone_SSE-320.sh --no-interactive --i-agree-to-the-contained-eula -d $$WORKSPACE_ROOT/$$FVP_DIR/Corstone-320)
        (cd $$FVP_DIR && rm FVP_Corstone_SSE-320.sh)
        # Create symlinks to binaries
        (cd bin && ln -sf ../$$FVP_DIR/Corstone-300/models/*/FVP_* .)
        (cd bin && ln -sf ../$$FVP_DIR/Corstone-310/models/*/FVP_* .)
        (cd bin && ln -sf ../$$FVP_DIR/Corstone-315/models/*/FVP_* .)
        (cd bin && ln -sf ../$$FVP_DIR/Corstone-320/models/*/FVP_* .)
      else
        echo "Warning: corestone-fvp not installed (Linux x86_64/aarch64-specific installation skipped on $$(uname -s)/$$(uname -m))"
      fi

  # Install FVP Base models (x86_64 and aarch64)
  - name: fvp-base
    sentinel: opt/.fvp-base-installed
    commands: |
      DOWNLOADS="downloads"
      FVP_DIR="opt/fvps"
      mkdir -p $$FVP_DIR bin
      if [ "$$(uname -s)" = "Linux" ]; then
        ARCH=$$(uname -m)
        if [ "$$ARCH" = "x86_64" ]; then
          SUFFIX=""
        elif [ "$$ARCH" = "aarch64" ]; then
          SUFFIX="_armv8l"
        else
          echo "Warning: fvp-base not installed (unsupported architecture $$ARCH)"
          exit 0
        fi
        # Extract Base RevC
        (cd $$FVP_DIR && tar xf ../../$$DOWNLOADS/FVP_Base_RevC-2xAEMvA_11.27_19_Linux64$$SUFFIX.tgz)
        # Extract Base AEMv8R
        (cd $$FVP_DIR && tar xf ../../$$DOWNLOADS/FVP_Base_AEMv8R_11.27_19_Linux64$$SUFFIX.tgz)
        # Create symlinks to binaries
        (cd bin && ln -sf ../$$FVP_DIR/*_pkg/models/*/FVP_* .)
      else
        echo "Warning: fvp-base not installed (Linux-specific installation skipped on $$(uname -s))"
      fi
